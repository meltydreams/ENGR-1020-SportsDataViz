<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Shot Input</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="student-page">

    <h1>Log a Shot</h1>
    <h3 id="displaySessionCode">Joined Session: ...</h3>
    <p class="instruction-text">Select the area which you shot from</p>
    <div id="shotInputContainer" class="shot-input-court">
        
        <div id="zone1" class="zone" onclick="showInputTooltip(event, 1)"></div>
        <div id="zone2" class="zone" onclick="showInputTooltip(event, 2)"></div>
        <div id="zone3" class="zone" onclick="showInputTooltip(event, 3)"></div>
        <div id="zone4" class="zone" onclick="showInputTooltip(event, 4)"></div>
        <div id="zone5" class="zone" onclick="showInputTooltip(event, 5)"></div>
        <div id="zone6" class="zone" onclick="showInputTooltip(event, 6)"></div>

        <div id="inputTooltip" class="input-tooltip hidden">
            <strong id="tooltipHeader">Zone</strong>
            <div class="tooltip-buttons">
                <button class="btn-yes" onclick="submitLoggedShot(true)">Yes +3</button>
                <button class="btn-no" onclick="submitLoggedShot(false)">No +0</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/student.js"></script>
</body>
</html>
