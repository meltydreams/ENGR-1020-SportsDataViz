<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="teacher-page">

    <div class="header-section">
        <h1>Teacher Dashboard</h1>
        <button id="startSessionBtn" onclick="createNewSession()">Start New Session</button>
        <h2 id="sessionCodeDisplay">Session Code: ------</h2>
    </div>

    <div class="dashboard-container">
        <h3>Live Shot Heatmap</h3>
        <div id="heatmapContainer" class="heatmap-court">
            <div id = "hz1" class="heat-zone"></div>
            <div id = "hz2" class="heat-zone"></div>
            <div id = "hz3" class="heat-zone"></div>
            <div id = "hz4" class="heat-zone"></div>
            <div id = "hz5" class="heat-zone"></div>
            <div id = "hz6" class="heat-zone"></div>
        </div>
    </div>

    <script type="module" src="../js/teacher.js"></script>
</body>
</html>
