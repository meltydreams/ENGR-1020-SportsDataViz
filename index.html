<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Session</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>Join Session</h1>

<label for="code">Session Code</label>
<input type="text" id="code" placeholder="Enter session code">
<br><br>
<button onclick="joinSession()">Join</button>

<script type="module">
  import { sessionExists } from "./js/api.js";

  async function joinSession() {
  const codeInput = document.getElementById("code");
  const code = codeInput.value.trim().toUpperCase();

  // 1. Check if empty
  if (!code) {
    alert("Please enter a session code.");
    return;
  }

  // 2. Validate format (Exactly 6 Capital Letters)
  const codeRegex = /^[A-Z]{6}$/;
  if (!codeRegex.test(code)) {
    alert("Invalid format! The code must be exactly 6 capital letters.");
    return;
  }

  try {
    // 3. Check Firebase for the session
    // This calls the helper function located in your api.js
    const valid = await sessionExists(code);
    
    if (valid) {
      console.log("Session found, redirecting...");
      window.location.href = "html/student.html?session=" + code;
    } else {
      // 4. Handle non-existent session
      alert("Session '" + code + "' not found. Ask your teacher for the current code.");
      codeInput.value = ""; // Clear the input for a retry
    }
  } catch (error) {
    console.error("Join Error:", error);
    alert("Connection error. Please check your internet and try again.");
  }
}

  window.joinSession = joinSession;
</script>

</body>
</html>
