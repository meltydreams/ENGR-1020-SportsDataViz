<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Session</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="student-page" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f4f9;">

    <div class="join-container" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; border: 1px solid #ddd;">
        
        <h1 style="font-size: 2.5rem; margin-bottom: 30px; color: #1a1a1a;">Join Session</h1>
        
        <div style="margin-bottom: 20px;">
            <label for="name" style="display: block; font-weight: bold; margin-bottom: 10px; color: #555; font-size: 1.1rem;">
                Your Name
            </label>
            <input type="text" id="name" placeholder="Enter your name" 
                   style="width: 90%; padding: 15px; font-size: 1.3rem; border: 2px solid #eee; border-radius: 10px; text-align: center;">
        </div>

        <div style="margin-bottom: 30px;">
            <label for="code" style="display: block; font-weight: bold; margin-bottom: 10px; color: #555; font-size: 1.1rem;">
                Session Code
            </label>
            <input type="text" id="code" placeholder="Enter 6-letter code" 
                   style="width: 90%; padding: 15px; font-size: 1.3rem; border: 2px solid #eee; border-radius: 10px; text-align: center; text-transform: uppercase; letter-spacing: 2px;">
        </div>

        <button id="joinBtn" onclick="joinSession()" 
                style="width: 100%; padding: 18px; font-size: 1.2rem; font-weight: bold; background-color: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, background-color 0.2s;">
            JOIN SESSION
        </button>
        
    </div>

    <script type="module">
        import { sessionExists } from "./js/api.js";

        async function joinSession() {
            const nameInput = document.getElementById("name");
            const codeInput = document.getElementById("code");
            
            const studentName = nameInput.value.trim();
            const code = codeInput.value.trim().toUpperCase();

            if (!studentName) {
                alert("Please enter your name.");
                return;
            }

            const codeRegex = /^[A-Z]{6}$/;
            if (!codeRegex.test(code)) {
                alert("Invalid format! The code must be exactly 6 capital letters.");
                return;
            }

            try {
                const valid = await sessionExists(code);
                
                if (valid) {
                    console.log("Session found, redirecting...");
                    window.location.href = `html/student.html?session=${code}&name=${encodeURIComponent(studentName)}`;
                } else {
                    alert("Session '" + code + "' not found. Ask your teacher for the current code.");
                    codeInput.value = "";
                }
            } catch (error) {
                console.error("Join Error:", error);
                alert("Connection error. Please check your internet and try again.");
            }
        }

        window.joinSession = joinSession;
    </script>
</body>
</html>
